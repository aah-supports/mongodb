services:
  mongodb:
    image: mongo:8.0
    container_name: sandbox-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: nyc_food
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
      - ./scripts:/scripts:ro
      - ../data/nyc-food:/seed/nyc-food:ro

  mongo-express:
    image: mongo-express:1.0.2
    container_name: sandbox-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpass
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpass@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"

  api:
    build:
      context: ./api
    container_name: sandbox-nyc-food-api
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://student:studentpass@mongodb:27017/nyc_food
      MONGODB_DB: nyc_food
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules

volumes:
  mongodb_data:
  api_node_modules:
